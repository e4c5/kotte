# Used when pytest is run from `backend/` (e.g. make test-backend).
# Repository root also has ../pytest.ini for `pytest` run from kotte/ — keep in sync.
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    performance: marks tests as performance benchmarks (require USE_REAL_TEST_DB, skip by default)

filterwarnings =
    ignore:SESSION_SECRET_KEY not set.*:UserWarning
    ignore:MASTER_ENCRYPTION_KEY not set.*:UserWarning

