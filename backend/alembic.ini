# Alembic config for Kotte (ROADMAP B7).
#
# Run from `backend/`:
#     alembic upgrade head
#     alembic downgrade -1
#     alembic current
#     alembic history
#     alembic revision -m "short description"   # no --autogenerate, see env.py
#
# Target database: the connection URL is resolved in `alembic/env.py`
# from DB_* environment variables (or `-x url=...` / ALEMBIC_SQLALCHEMY_URL
# override). The placeholder below is intentional — env.py falls back to
# env vars when it detects the `driver://...` stub.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
file_template = %%(rev)s_%%(slug)s

# Placeholder — see `alembic/env.py:_resolve_url()` for how this is
# overridden at runtime. Leave as-is unless you're wiring a single fixed
# target (e.g. a CI runner).
sqlalchemy.url = driver://user:pass@localhost/dbname


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
