# Kotte — development compose (ROADMAP B6)
#
# Inner-loop target. What this adds over the prod compose:
#   * Bind-mounts `backend/app` and the frontend source into the containers
#     so `uvicorn --reload` and vite's HMR pick up edits without a rebuild.
#   * Uses the dev-flavoured frontend image (`frontend.Dockerfile` → vite
#     dev server on 5173 with HMR) instead of the prod nginx one.
#   * Exposes age on 5432 on the host so `psql` / dbeaver / etc. can attach
#     directly.
#   * `ENVIRONMENT=development` so the backend keeps debug-level log
#     formatting and permissive CORS. Switches to production hardening are
#     in `docker-compose.prod.yml`.
#
# Run: `docker compose -f deployment/docker-compose.dev.yml up` (or
# `make compose-up-dev`).

services:
  age:
    image: apache/age:latest
    container_name: kotte-age
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - age-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-age.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    container_name: kotte-backend
    environment:
      DB_HOST: age
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-dev-not-secret-change-me}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://frontend:5173"]'
      ENVIRONMENT: development
      CREDENTIAL_STORAGE_PATH: /app/data/connections.json
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      # Source mount for `uvicorn --reload`. Only `/app/app` is mounted so
      # we don't clobber `/app/site-packages` (deps from the builder stage)
      # or `/app/data` (the credential-store volume).
      - ../backend/app:/app/app:rw
    # Override the Dockerfile's CMD to turn on --reload. --reload-dir keeps
    # the watcher from recursing into site-packages (which would fire on
    # every pip cache hit).
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app
    depends_on:
      age:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
      args:
        VITE_PROXY_TARGET: http://backend:8000
    container_name: kotte-frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    # The `/app/node_modules` anonymous volume is the classic vite-in-docker
    # trick: it shadows the host node_modules (which may be from the host OS
    # / a different arch) with the image's, letting HMR still see edits on
    # `src/` and `public/`.
    volumes:
      - ../frontend:/app:rw
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  age-data:
  backend-data:
