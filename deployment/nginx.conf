# ROADMAP B5 — nginx config shipped inside `frontend.Dockerfile.prod`.
#
# Mounted at /etc/nginx/conf.d/kotte.conf (not default.conf, which we
# delete in the Dockerfile to avoid a shadowed listener).

# Compress text-ish responses above 1 KB. Vite's chunks are already
# fingerprinted, so we don't gzip images (mostly binary / already
# compressed) or fonts (usually woff2 which has its own compression).
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/manifest+json
    application/rss+xml
    application/wasm
    font/ttf
    image/svg+xml
    text/css
    text/plain
    text/xml;

# Hide the nginx version banner on errors; bug reports should come from
# our own logs, not from exposed server metadata.
server_tokens off;

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Static assets emitted by vite carry a content hash in the filename
    # (e.g. /assets/index-DkV4XB92.js) so they're safe to cache forever.
    # A deploy that ships a new bundle will reference a new hash, so
    # clients fetch fresh bytes without needing to bust the cache.
    #
    # Single Cache-Control header (not `expires` + `add_header`) because
    # the two directives together emit two separate `Cache-Control`
    # response headers which some intermediaries coalesce incorrectly.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # index.html, in contrast, must never be cached: it's the one file
    # whose URL stays constant and whose contents reference the hashed
    # assets. Caching it would strand clients on old bundles.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback: any unknown path (e.g. /workspace/g1) is routed to
    # index.html so the React router can resolve it client-side. Without
    # this, a hard-refresh on a sub-route would 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Common hardening headers. The backend also emits some of these via
    # SecurityHeadersMiddleware; nginx emits them for static responses
    # where the FastAPI middleware isn't in the path.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
