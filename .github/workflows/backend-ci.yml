# ROADMAP B1 — Backend CI
#
# Jobs:
#   - lint       : ruff + black + mypy (ROADMAP B1.2)
#   - unit       : pytest excluding integration + performance (no DB)
#   - integration: pytest -m integration against apache/age service (B1.3)

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install lint tools
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

      - name: black --check
        run: black --check .

      - name: mypy
        run: mypy app

  unit:
    name: Unit tests (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend
        run: pip install -r requirements-dev.txt

      # `--no-cov` keeps CI fast; coverage stays available locally via
      # `make test-backend`. The integration + performance markers are
      # excluded — they need either real Postgres + AGE or are perf benches.
      - name: pytest (unit only)
        run: pytest -m "not integration and not performance" --no-cov

  integration:
    name: Integration tests (Apache AGE)
    runs-on: ubuntu-latest
    env:
      # Without a job-level `container:`, the runner reaches service containers
      # via localhost + the published port — not the Compose-style service name.
      USE_REAL_TEST_DB: 'true'
      TEST_DB_HOST: localhost
      TEST_DB_PORT: '5432'
      TEST_DB_NAME: postgres
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
    services:
      # Docker Hub tag ``PG16_latest`` does not exist; ``dev_snapshot_PG16``
      # tracks PostgreSQL 16 + AGE (same family ROADMAP B1.3 intended).
      age:
        image: apache/age:dev_snapshot_PG16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend (incl. alembic for migrate-up)
        run: pip install -r requirements-dev.txt

      - name: Apply alembic migrations
        run: alembic upgrade head

      - name: pytest (integration marker)
        run: pytest -m integration --no-cov
